<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releases | LimeTree CLI</title>
    <style>
        :root {
            --render-purple: #4d3df7;
            --render-bg: #f9f9fb;
            --render-card: #ffffff;
            --render-text: #1a1a1a;
            --render-secondary: #6b7280;
            --render-border: #e5e7eb;
            --render-success: #00c853;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--render-bg);
            color: var(--render-text);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .release-card {
            background: var(--render-card);
            border: 1px solid var(--render-border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .release-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .version-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .version-number {
            font-size: 22px;
            font-weight: 600;
            color: var(--render-purple);
        }

        .status-badge {
            background-color: #e8f5e9;
            color: var(--render-success);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .date-label {
            color: var(--render-secondary);
            font-size: 14px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--render-secondary);
            margin: 24px 0 12px;
        }

        .changelog {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .changelog li {
            padding: 8px 0;
            border-bottom: 1px solid var(--render-border);
            font-size: 15px;
        }

        .changelog li:last-child {
            border-bottom: none;
        }

        .command-box {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            position: relative;
            margin-top: 12px;
        }

        .command-box::before {
            content: "$";
            color: var(--render-purple);
            margin-right: 10px;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: var(--render-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Last Release</h1>
    </div>

    <div class="release-card">
        <div class="release-top">
            <div class="version-info">
                <span class="version-number">v1.1.1</span>
                <span class="status-badge">Active</span>
            </div>
            <span class="date-label">Released on Mar 19, 2026</span>
        </div>

        <div class="section-title">Introduction</div>
        <ul class="changelog">
            <li>Use <code>limetree help</code> command on CMD for more details.</li>
        </ul>

        <div class="section-title">Quick Install</div>
        <div class="command-box">
            npm install -g limetree-engine
        </div>
        <h3> </h3>
        <a href="limetreeforcomputers.zip" download="limetreeforcomputers.zip">Or download the app for computers.</a>
    </div>

    <div class="footer">
        &copy; 2026 LimeTree Ecosystem. Maintained by @canuxs.
    </div>
</div>

</body>
</html>
